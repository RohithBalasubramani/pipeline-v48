[pytest]
# R8 [2026-07-12 audit]: pin rootdir/testpaths so the tests/conftest.py `layer2` package-shadow workaround is
# deterministic (was implicit on sys.path[0] order — testing-audit T13), and default the suite to the OFFLINE lane.
# The `live` tier (real Qwen :8200 and/or live DB) is excluded by default so a plain `pytest` runs green with no
# services; run the live tier explicitly with `pytest -m live` (or `-m ""` for everything).
testpaths = tests
# Repo root on sys.path regardless of invocation cwd (audit follow-up #12 — pytest used to rely on repo-root cwd
# for `layer2`/`ems_exec` imports; resolved HERE rather than a pyproject.toml so there stays ONE pytest config home).
pythonpath = .
addopts = -m "not live"
markers =
    live: exercises a live Qwen (:8200) and/or a live DB — excluded from the default offline lane. Run with -m live.
